name: Pre-Launch Security Tests

on:
  schedule:
    # Toda segunda às 06:00 UTC (03:00 BRT)
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      organization_id:
        description: "UUID da organização alvo (use a SECQA org)"
        required: true
        type: string

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  CRON_SECRET: ${{ secrets.CRON_SECRET }}
  ORGANIZATION_ID: ${{ inputs.organization_id || vars.PRE_LAUNCH_ORG_ID }}

jobs:
  dependency-scan:
    name: 6.4 — Dependency scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Run audit
        id: audit
        run: |
          set +e
          bun audit --production > audit.txt 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          cat audit.txt
        continue-on-error: true
      - name: Report 6.4
        if: always()
        run: |
          STATUS="passed"
          NOTES="bun audit limpo"
          if [ "${{ steps.audit.outputs.exit_code }}" != "0" ]; then
            STATUS="failed"
            NOTES="bun audit reportou vulnerabilidades — ver run logs"
          fi
          curl -s -X POST "$SUPABASE_URL/functions/v1/pre-launch-test-runner" \
            -H "x-cron-secret: $CRON_SECRET" \
            -H "content-type: application/json" \
            -d "{\"organization_id\":\"$ORGANIZATION_ID\",\"tests\":[]}" | head -c 200 || true
          # Resultado do 6.4 vai como upsert manual via PostgREST (skipped no runner)
          echo "Status 6.4: $STATUS — $NOTES"

  zod-coverage:
    name: 4.7 — Zod validation coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verifica schemas Zod nas edge functions
        id: zod
        run: |
          MISSING=0
          for fn_dir in supabase/functions/*/; do
            name=$(basename "$fn_dir")
            [[ "$name" == _* ]] && continue
            if grep -rqE "z\.(object|string|number)" "$fn_dir"; then
              continue
            fi
            if grep -rqE "POST|PUT|PATCH" "$fn_dir/index.ts" 2>/dev/null; then
              echo "::warning::$name sem validação Zod aparente"
              MISSING=$((MISSING+1))
            fi
          done
          echo "missing=$MISSING" >> "$GITHUB_OUTPUT"
      - name: Falha se houver gaps
        if: steps.zod.outputs.missing != '0'
        run: exit 1

  automated-suite:
    name: Suíte automatizada (regressão + checks)
    runs-on: ubuntu-latest
    needs: [dependency-scan, zod-coverage]
    if: always()
    steps:
      - name: Trigger pre-launch-test-runner
        run: |
          if [ -z "$CRON_SECRET" ] || [ -z "$ORGANIZATION_ID" ]; then
            echo "CRON_SECRET ou ORGANIZATION_ID não configurados"
            exit 1
          fi
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST \
            "$SUPABASE_URL/functions/v1/pre-launch-test-runner" \
            -H "x-cron-secret: $CRON_SECRET" \
            -H "content-type: application/json" \
            -d "{\"organization_id\":\"$ORGANIZATION_ID\"}")
          BODY=$(echo "$RESPONSE" | head -n -1)
          CODE=$(echo "$RESPONSE" | tail -n 1)
          echo "$BODY" | tee result.json
          if [ "$CODE" != "200" ] && [ "$CODE" != "207" ]; then
            echo "HTTP $CODE — falha na execução"
            exit 1
          fi
          FAILED=$(echo "$BODY" | grep -oE '"failed":[0-9]+' | head -1 | cut -d: -f2)
          if [ "$FAILED" != "0" ]; then
            echo "::error::$FAILED testes falharam"
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pre-launch-results
          path: result.json
