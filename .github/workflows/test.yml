name: Test Gates (Lint + Unit + E2E + Coverage)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Unit Tests
        run: npm run test:unit -- --run
        env:
          CI: true

      - name: Generate coverage report
        run: npm run test:unit -- --run --coverage
        env:
          CI: true
        continue-on-error: true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  coverage-check:
    name: Coverage Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: unit-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Download coverage artifact
        uses: actions/download-artifact@v3
        with:
          name: coverage-report
          path: coverage/

      - name: Check coverage threshold (70%)
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            COVERAGE=$(node -e "const c=require('./coverage/coverage-summary.json'); console.log(Math.round(c.total.lines.pct))")
            echo "Current coverage: ${COVERAGE}%"
            if [ "$COVERAGE" -lt 70 ]; then
              echo "❌ Coverage is below 70% threshold"
              exit 1
            else
              echo "✅ Coverage meets threshold"
            fi
          fi

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Build application
        run: npm run build
        env:
          CI: true

      - name: Run E2E tests
        run: npx playwright test
        env:
          CI: true
          BASE_URL: http://localhost:5173

      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test videos
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: e2e-test-videos
          path: test-results/
          retention-days: 7

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: always()
    needs: [lint, unit-tests, coverage-check, e2e-tests]

    steps:
      - name: Check test results
        run: |
          JOBS_STATUS="${{ needs.lint.result }} ${{ needs.unit-tests.result }} ${{ needs.coverage-check.result }} ${{ needs.e2e-tests.result }}"

          if [[ "$JOBS_STATUS" == *"failure"* ]]; then
            echo "❌ Some tests failed"
            exit 1
          else
            echo "✅ All tests passed"
          fi

      - name: Comment PR with summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const comment = `## ✅ Test Gates Summary

            | Check | Status |
            |-------|--------|
            | 🔍 Lint | ${{ needs.lint.result == 'success' && '✅ PASS' || '❌ FAIL' }} |
            | 🧪 Unit Tests | ${{ needs.unit-tests.result == 'success' && '✅ PASS' || '❌ FAIL' }} |
            | 📊 Coverage (70%+) | ${{ needs.coverage-check.result == 'success' && '✅ PASS' || '❌ FAIL' }} |
            | 🎭 E2E Tests | ${{ needs.e2e-tests.result == 'success' && '✅ PASS' || '❌ FAIL' }} |

            [View workflow logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

